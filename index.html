  <meta name="keywords" content="IPTV, streaming apps, live TV, movies, series, premium apps" />
  <meta name="author" content="ANUBIS APP LIBRARY" />
  <title>ANUBIS APP LIBRARY</title>

  <style>
    /* ============================================================
       RESET & BASE
    ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-void:       #04040a;
      --bg-card:       #0d0d18;
      --bg-card-hover: #141428;
      --border:        rgba(255,255,255,0.07);
      --border-hover:  rgba(120,100,255,0.45);
      --accent:        #7b5cfa;
      --accent-2:      #c03bff;
      --accent-glow:   rgba(123,92,250,0.35);
      --text-primary:  #f0eeff;
      --text-muted:    #8e8aaa;
      --text-dim:      #55516e;
      --badge-live:    #22c55e;
      --badge-new:     #f59e0b;
      --badge-update:  #3b82f6;
      --badge-hot:     #ef4444;
      --radius-card:   18px;
      --radius-pill:   50px;
      --transition:    0.28s cubic-bezier(.4,0,.2,1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-void);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ============================================================
       GALAXY BACKGROUND
    ============================================================ */
    #galaxy-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ============================================================
       WRAPPER
    ============================================================ */
    .page-wrapper {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px 80px;
    }

    /* ============================================================
       HERO HEADER
    ============================================================ */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 64px 0 40px;
      gap: 0;
    }

    /* circular logo */
    .logo-wrap {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1a1040 0%, #3b1d8a 50%, #7b5cfa 100%);
      box-shadow:
        0 0 0 3px rgba(123,92,250,0.25),
        0 0 40px rgba(123,92,250,0.40),
        0 0 80px rgba(123,92,250,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
      flex-shrink: 0;
      animation: logoFloat 6s ease-in-out infinite;
    }

    @keyframes logoFloat {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    .logo-wrap svg {
      width: 58px;
      height: 58px;
      filter: drop-shadow(0 0 12px rgba(192,59,255,0.7));
    }

    .site-title {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(90deg, #c8b8ff 0%, #ffffff 40%, #b89bff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.15;
      margin-bottom: 14px;
    }

    .site-tagline {
      font-size: 1.05rem;
      color: var(--text-muted);
      max-width: 460px;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    /* ============================================================
       SOCIAL BUTTONS
    ============================================================ */
    .social-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 0;
    }

    .social-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      border-radius: var(--radius-pill);
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      text-decoration: none;
      transition: var(--transition);
      border: 1.5px solid transparent;
      cursor: pointer;
    }

    .social-btn.telegram {
      background: linear-gradient(135deg,#0f7fd4,#29a8e0);
      color: #fff;
      border-color: rgba(41,168,224,0.4);
      box-shadow: 0 4px 20px rgba(15,127,212,0.30);
    }
    .social-btn.telegram:hover {
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 8px 30px rgba(15,127,212,0.50);
    }

    .social-btn.youtube {
      background: linear-gradient(135deg,#b01010,#ff2424);
      color: #fff;
      border-color: rgba(255,36,36,0.4);
      box-shadow: 0 4px 20px rgba(176,16,16,0.30);
    }
    .social-btn.youtube:hover {
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 8px 30px rgba(255,36,36,0.50);
    }

    .social-btn.facebook {
      background: linear-gradient(135deg,#1244a8,#1877f2);
      color: #fff;
      border-color: rgba(24,119,242,0.4);
      box-shadow: 0 4px 20px rgba(18,68,168,0.30);
    }
    .social-btn.facebook:hover {
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 8px 30px rgba(24,119,242,0.50);
    }

    .social-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* ============================================================
       DIVIDER
    ============================================================ */
    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 44px 0 36px;
    }

    /* ============================================================
       SEARCH BAR
    ============================================================ */
    .search-wrap {
      position: relative;
      max-width: 680px;
      margin: 0 auto 44px;
    }

    .search-icon {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      pointer-events: none;
      transition: color var(--transition);
    }

    .search-input {
      width: 100%;
      padding: 18px 52px 18px 54px;
      background: rgba(255,255,255,0.045);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-pill);
      color: var(--text-primary);
      font-size: 1rem;
      outline: none;
      transition: var(--transition);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .search-input::placeholder { color: var(--text-dim); }

    .search-input:focus {
      border-color: var(--accent);
      background: rgba(123,92,250,0.07);
      box-shadow: 0 0 0 4px rgba(123,92,250,0.15), 0 8px 32px rgba(123,92,250,0.12);
    }

    .search-input:focus ~ .search-icon,
    .search-wrap:focus-within .search-icon {
      color: var(--accent);
    }

    .search-clear {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-dim);
      padding: 4px;
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      transition: color var(--transition);
    }
    .search-clear:hover { color: var(--text-primary); }
    .search-clear.visible { display: flex; }

    /* ============================================================
       SECTION HEADING
    ============================================================ */
    .section-heading {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .section-heading h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .section-heading .pill-count {
      background: rgba(123,92,250,0.18);
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 700;
      padding: 3px 11px;
      border-radius: 20px;
      border: 1px solid rgba(123,92,250,0.25);
    }

    .no-results {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      display: none;
    }
    .no-results.visible { display: block; }
    .no-results svg { margin-bottom: 16px; opacity: 0.4; }
    .no-results p { font-size: 1.05rem; }

    /* ============================================================
       APP CARDS GRID
    ============================================================ */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 18px;
    }

    /* individual card */
    .app-card {
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-card);
      padding: 24px 18px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    /* shimmer line at top */
    .app-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      opacity: 0;
      transition: opacity var(--transition);
      border-radius: var(--radius-card) var(--radius-card) 0 0;
    }

    /* subtle inner glow */
    .app-card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--radius-card);
      background: radial-gradient(ellipse at 50% 0%, rgba(123,92,250,0.12) 0%, transparent 70%);
      opacity: 0;
      transition: opacity var(--transition);
      pointer-events: none;
    }

    .app-card:hover {
      border-color: var(--border-hover);
      background: var(--bg-card-hover);
      transform: translateY(-6px) scale(1.02);
      box-shadow:
        0 12px 40px rgba(0,0,0,0.55),
        0 0 0 1px rgba(123,92,250,0.18),
        0 4px 20px var(--accent-glow);
    }

    .app-card:hover::before { opacity: 1; }
    .app-card:hover::after  { opacity: 1; }

    /* icon circle */
  .card-icon {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
      font-size: 2rem;
      box-shadow: 0 4px 18px rgba(0,0,0,0.4);
      flex-shrink: 0;
      transition: transform var(--transition);
      position: relative;
      z-index: 1;
}

.card-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 20px;
}
    .app-card:hover .card-icon {
      transform: scale(1.1) rotate(-4deg);
    }

    .card-name {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 10px;
      line-height: 1.3;
      position: relative;
      z-index: 1;
    }

    /* status badge */
    .card-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 20px;
      position: relative;
      z-index: 1;
    }

    .card-badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .badge-live    { background: rgba(34,197,94,0.15);  color: var(--badge-live);   border: 1px solid rgba(34,197,94,0.25); }
    .badge-live::before    { background: var(--badge-live);   box-shadow: 0 0 5px var(--badge-live);   animation: pulse 1.5s infinite; }

    .badge-new     { background: rgba(245,158,11,0.15); color: var(--badge-new);    border: 1px solid rgba(245,158,11,0.25); }
    .badge-new::before     { background: var(--badge-new); }

    .badge-update  { background: rgba(59,130,246,0.15); color: var(--badge-update); border: 1px solid rgba(59,130,246,0.25); }
    .badge-update::before  { background: var(--badge-update); }

    .badge-hot     { background: rgba(239,68,68,0.15);  color: var(--badge-hot);    border: 1px solid rgba(239,68,68,0.25); }
    .badge-hot::before     { background: var(--badge-hot); box-shadow: 0 0 5px var(--badge-hot); animation: pulse 1.2s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ============================================================
       FOOTER
    ============================================================ */
    .site-footer {
      text-align: center;
      padding: 40px 20px 0;
      color: var(--text-dim);
      font-size: 0.83rem;
      line-height: 1.8;
    }

    .site-footer a {
      color: var(--accent);
      text-decoration: none;
    }

    /* ============================================================
       RESPONSIVE
    ============================================================ */
    @media (max-width: 600px) {
      .cards-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }

      .app-card { padding: 18px 12px 16px; }
      .card-icon { width: 58px; height: 58px; font-size: 1.7rem; border-radius: 15px; }
      .card-name { font-size: 0.85rem; }
      .search-input { padding: 15px 44px 15px 48px; font-size: 0.95rem; }
      .hero { padding: 44px 0 28px; }
      .logo-wrap { width: 88px; height: 88px; }
    }

    @media (max-width: 380px) {
      .cards-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>

  /* ============================================================
     CARD RENDERER
  ============================================================ */
  function createCard(app) {
    const a = document.createElement('a');
    a.className = 'app-card';
    a.href    = app.url;
    a.target  = '_blank';
    a.rel     = 'noopener noreferrer';
    a.setAttribute('aria-label', `Open ${app.name}`);

    a.innerHTML = `
      <div class="card-icon" style="background:${app.bg};">
  <img src="${app.icon}" alt="${app.name}">
</div>
      <span class="card-name">${app.name}</span>
      <span class="card-badge badge-${app.badge}">${
        app.badge === 'live'   ? 'Live'    :
        app.badge === 'new'    ? 'New'     :
        app.badge === 'update' ? 'Updated' : 'Hot'
      }</span>
    `;
    return a;
  }

  /* ============================================================
     RENDER & FILTER
  ============================================================ */
  const grid      = document.getElementById('cards-grid');
  const countPill = document.getElementById('count-pill');
  const noResults = document.getElementById('no-results');

  function renderCards(list) {
    grid.innerHTML = '';
    list.forEach(app => grid.appendChild(createCard(app)));
    const n = list.length;
    countPill.textContent = n === 1 ? '1 app' : `${n} apps`;
    noResults.classList.toggle('visible', n === 0);
  }

  // Initial render
  renderCards(APPS);

  /* ============================================================
     LIVE SEARCH
  ============================================================ */
  const searchInput = document.getElementById('search-input');
  const searchClear = document.getElementById('search-clear');

  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim().toLowerCase();
    searchClear.classList.toggle('visible', q.length > 0);
    const filtered = q
      ? APPS.filter(a => a.name.toLowerCase().includes(q))
      : APPS;
    renderCards(filtered);
  });

  searchClear.addEventListener('click', () => {
    searchInput.value = '';
    searchClear.classList.remove('visible');
    renderCards(APPS);
    searchInput.focus();
  });

  /* ============================================================
     GALAXY CANVAS — procedural star field with nebula clouds
  ============================================================ */
  (function () {
    const canvas = document.getElementById('galaxy-canvas');
    const ctx    = canvas.getContext('2d');

    let W, H, stars, nebula;

    /* ---- helpers ---- */
    const rand = (a, b) => Math.random() * (b - a) + a;

    /* ---- setup ---- */
    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
      init();
    }

    function init() {
      /* stars */
      stars = Array.from({ length: 280 }, () => ({
        x:  rand(0, W),
        y:  rand(0, H),
        r:  rand(0.3, 1.6),
        a:  rand(0.2, 1),       // base opacity
        da: rand(0.002, 0.006), // twinkle speed
        t:  rand(0, Math.PI * 2), // twinkle phase
        c:  ['#ffffff','#c8b8ff','#b8d8ff','#ffd8b8'][Math.floor(rand(0,4))],
      }));

      /* nebula blobs */
      nebula = Array.from({ length: 6 }, () => ({
        x:  rand(0, W),
        y:  rand(0, H),
        r:  rand(W * 0.15, W * 0.38),
        c:  ['rgba(80,40,180,', 'rgba(120,30,160,', 'rgba(20,60,140,', 'rgba(60,20,100,'][Math.floor(rand(0,4))],
        a:  rand(0.04, 0.10),
      }));
    }

    /* ---- draw ---- */
    function draw(ts) {
      ctx.clearRect(0, 0, W, H);

      /* deep background */
      const bg = ctx.createRadialGradient(W*.5, H*.35, 0, W*.5, H*.35, Math.max(W,H)*.8);
      bg.addColorStop(0,   '#0e0824');
      bg.addColorStop(0.5, '#07051a');
      bg.addColorStop(1,   '#04040a');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, W, H);

      /* nebula clouds */
      nebula.forEach(n => {
        const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
        g.addColorStop(0,   n.c + n.a + ')');
        g.addColorStop(1,   n.c + '0)');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
        ctx.fill();
      });

      /* stars */
      const sec = ts * 0.001;
      stars.forEach(s => {
        const twinkle = s.a + 0.35 * Math.sin(sec * s.da * 60 + s.t);
        ctx.globalAlpha = Math.max(0.05, Math.min(1, twinkle));
        ctx.fillStyle   = s.c;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      });

      ctx.globalAlpha = 1;
      requestAnimationFrame(draw);
    }

    /* ---- boot ---- */
    window.addEventListener('resize', resize);
    resize();
    requestAnimationFrame(draw);
  })();
</script>
